name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AVR GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-avr avr-libc

      - name: Build
        run: make EXTRAINCDIRS=
